<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Roman Clock</title>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
}

.clock {
  position: relative;
  width: 75vmin;
  height: 75vmin;
  border-radius: 50%;
}

/* TRUE CENTER POINT */
.center {
  position: absolute;
  width: 4vmin;
  height: 4vmin;
  background: black;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

/* HANDS - FIXED */
.hand {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: 50% 50%; /* Changed to center */
  transform: translate(-50%, -50%) rotate(0deg);
  background: black;
}

.hour {
  width: 30%;
  height: 1vmin;
}

.minute {
  width: 45%;
  height: 0.6vmin;
}
#hour{
    margin: auto;
}
/* NUMBERS */
.number {
  position: absolute;
  top: 50%;
  left: 50%;
  font-family: "Times New Roman", serif;
  font-size: 5vmin;
  font-weight: bold;
  transform-origin: center;
}
</style>
</head>

<body>

<div class="clock" id="clock">
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="center"></div>
</div>

<script>
const clock = document.getElementById("clock");
const hourHand = document.getElementById("hour");
const minuteHand = document.getElementById("minute");

const numerals = [
  "XII","I","II","III","IV","V",
  "VI","VII","VIII","IX","X","XI"
];

const radius = 35; // vmin-based distance from center

numerals.forEach((num, i) => {
  const el = document.createElement("div");
  el.className = "number";
  el.textContent = num;

  const angle = i * 30;

  el.style.transform =
    `translate(-50%, -50%) rotate(${angle}deg) translate(${radius}vmin) rotate(-${angle}deg)`;

  clock.appendChild(el);
});

function updateClock() {
  const now = new Date();

  const minutes = now.getMinutes() + now.getSeconds() / 60;
  const hours = (now.getHours() % 12) + minutes / 60;

  minuteHand.style.transform =
    `translate(-50%, -50%) rotate(${minutes * 6}deg)`;

  hourHand.style.transform =
    `translate(-50%, -50%) rotate(${hours * 30}deg)`;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
