<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="email"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group, .checkbox-group {
            margin-top: 5px;
        }
        .radio-option, .checkbox-option {
            margin-bottom: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>User Information Form</h1>
    <p>Please fill out this form with your information.</p>
    
    <form id="userForm" action="mailto:nahid.publics@gmail.com" method="post" enctype="text/plain">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" max="120">
        </div>
        
        <div class="form-group">
            <label>Gender:</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="prefer-not-to-say" name="gender" value="prefer-not-to-say">
                    <label for="prefer-not-to-say">Prefer not to say</label>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="">Select a country</option>
                <option value="usa">United States</option>
                <option value="canada">Canada</option>
                <option value="uk">United Kingdom</option>
                <option value="australia">Australia</option>
                <option value="other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="comments">Additional Comments:</label>
            <textarea id="comments" name="comments" rows="4" style="width: 100%;"></textarea>
        </div>
        
        <div class="form-group">
            <label>Subscribe to newsletter:</label>
            <div class="checkbox-group">
                <div class="checkbox-option">
                    <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                    <label for="newsletter">Yes, I want to receive updates</label>
                </div>
            </div>
        </div>
        
        <button type="submit">Submit Form</button>
    </form>

    <script>
        // Simple script to log the user's email from browser storage if available
        document.addEventListener('DOMContentLoaded', function() {
            // Try to get email from localStorage (if previously stored)
            const storedEmail = localStorage.getItem('userEmail');
            if (storedEmail) {
                document.getElementById('email').value = storedEmail;
            }
            
            // Store email when form is submitted
            document.getElementById('userForm').addEventListener('submit', function() {
                const email = document.getElementById('email').value;
                if (email) {
                    localStorage.setItem('userEmail', email);
                }
            });
        });
    </script>
</body>
</html>
