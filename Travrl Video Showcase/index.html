<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Vlog</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>

<body>
    <header>
        <h1>My Travel Vlog</h1>
    </header>
    <main>
        <div class="container" id="video-list">
            <!-- Videos will be dynamically inserted here -->
        </div>
    </main>
    <script>
        const videos = [{
                title: "Paris - The City of Lights",
                url: "https://www.youtube.com/embed/Scxs7L0vhZ4"
            },
            {
                title: "Exploring Tokyo",
                url: "https://www.youtube.com/embed/qh8qT0AdD50"
            },
            {
                title: "Adventures in Bali",
                url: "https://www.youtube.com/embed/MA9rI6Nw6HU"
            }
        ];

        const videoList = document.getElementById("video-list");

        videos.forEach(video => {
            const videoCard = document.createElement("div");
            videoCard.classList.add("video-card");
            videoCard.innerHTML = `
                <h2>${video.title}</h2>
                <iframe width="100%" height="315" src="${video.url}" frameborder="0" allowfullscreen></iframe>
            `;
            videoList.appendChild(videoCard);
        });
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 20px 0;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .video-card {
            background: white;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        .video-card h2 {
            font-size: 18px;
        }

        iframe {
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</body>

</html>
